name: Feature Request
description: Suggest a new feature or enhancement.
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion.
        Please describe your idea clearly so it can be evaluated.

  - type: input
    id: summary
    attributes:
      label: Feature Summary
      description: Briefly describe the requested feature.
      placeholder: A concise description.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, references, mockups, or screenshots.name: Feature Request
